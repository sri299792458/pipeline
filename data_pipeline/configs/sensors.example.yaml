sensors:
  wrist:
    sensor_id: "cam_lightning_wrist_0"
    modality: "rgbd_camera"
    attached_to: "lightning"
    mount_parent: "arm"
    mount_site: "wrist"
    mount_index: 0
    semantic_role_hint: "wrist"
    serial_number: "WRIST-REALSENSE-SERIAL"
    model: "Intel RealSense D405"
    firmware_version: "5.16.x"

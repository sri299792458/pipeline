profile_name: multisensor_20hz_lightning
profile_version: 1

dataset:
  fps: 20
  clock_policy: host_capture_time_v1

notes:
  rationale:
    - "Single-arm Lightning published profile."
    - "Use the same 20 Hz published timeline as the bimanual profile."
    - "Keep the real Lightning field names instead of padding an inactive Thunder arm."
  arm_order:
    - lightning
  required_arms:
    - lightning

published:
  observation_state:
    field: observation.state
    align: latest_before
    max_age_ms: 50
    names:
      - lightning_joint_pos_1
      - lightning_joint_pos_2
      - lightning_joint_pos_3
      - lightning_joint_pos_4
      - lightning_joint_pos_5
      - lightning_joint_pos_6
      - lightning_eef_x
      - lightning_eef_y
      - lightning_eef_z
      - lightning_eef_rx
      - lightning_eef_ry
      - lightning_eef_rz
      - lightning_gripper_position
      - lightning_ft_fx
      - lightning_ft_fy
      - lightning_ft_fz
      - lightning_ft_tx
      - lightning_ft_ty
      - lightning_ft_tz
    sources:
      lightning:
        joint_state: /spark/lightning/robot/joint_state
        eef_pose: /spark/lightning/robot/eef_pose
        tcp_wrench: /spark/lightning/robot/tcp_wrench
        gripper_state: /spark/lightning/robot/gripper_state

  action:
    field: action
    align: latest_before
    max_age_ms: 150
    names:
      - lightning_cmd_joint_1
      - lightning_cmd_joint_2
      - lightning_cmd_joint_3
      - lightning_cmd_joint_4
      - lightning_cmd_joint_5
      - lightning_cmd_joint_6
      - lightning_cmd_gripper
    sources:
      lightning:
        cmd_joint_state: /spark/lightning/teleop/cmd_joint_state
        cmd_gripper_state: /spark/lightning/teleop/cmd_gripper_state

  images:
    - field: observation.images.wrist
      topic: /spark/cameras/wrist/color/image_raw
      align: nearest
      max_skew_ms: 25
      required: true

    - field: observation.images.scene
      topic: /spark/cameras/scene/color/image_raw
      align: nearest
      max_skew_ms: 25
      required: true

    - field: observation.images.gelsight_left
      topic: /spark/tactile/left/color/image_raw
      align: nearest
      max_skew_ms: 25
      required: false

    - field: observation.images.gelsight_right
      topic: /spark/tactile/right/color/image_raw
      align: nearest
      max_skew_ms: 25
      required: false

raw_only_topics:
  - /spark/cameras/wrist/depth/image_rect_raw
  - /spark/cameras/scene/depth/image_rect_raw
  - /spark/tactile/left/depth/image_raw
  - /spark/tactile/right/depth/image_raw
  - /spark/tactile/left/marker_offset
  - /spark/tactile/right/marker_offset

published_depth:
  - field: observation.depth.wrist
    topic: /spark/cameras/wrist/depth/image_rect_raw
    align: nearest
    max_skew_ms: 25
    required: true
    unit: millimeters

  - field: observation.depth.scene
    topic: /spark/cameras/scene/depth/image_rect_raw
    align: nearest
    max_skew_ms: 25
    required: true
    unit: millimeters

conversion:
  frame_grid:
    start_rule: max_of_first_required_timestamps
    end_rule: min_of_last_required_timestamps

  missing_data_policy:
    tail_failure: truncate_episode
    mid_episode_failure: fail_episode

  diagnostics:
    - usable_interval
    - published_frame_count
    - per_modality_alignment_error
    - invalid_frame_count

profile_name: multisensor_20hz
profile_version: 3

dataset:
  fps: 20
  clock_policy: host_capture_time_v1

teleop_activity:
  topic: /spark/session/teleop_active
  active_value: true
  required_for_record: true
  required_for_convert: false
  hold_semantics: zero_order_hold_until_next_sample

published:
  observation_state:
    align: latest_before
    max_age_ms: 50

  action:
    align: latest_before
    max_age_ms: 50

  images:
    align: nearest
    max_skew_ms: 25
    required: true

published_depth:
  align: nearest
  max_skew_ms: 25
  required: false
  unit: millimeters

conversion:
  frame_grid:
    start_rule: max_of_first_required_timestamps
    end_rule: min_of_last_required_timestamps

  missing_data_policy:
    tail_failure: truncate_episode
    mid_episode_failure: fail_episode

  diagnostics:
    - usable_interval
    - published_frame_count
    - per_modality_alignment_error
    - invalid_frame_count

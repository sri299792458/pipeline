profile_name: multisensor_20hz_thunder
profile_version: 3

dataset:
  fps: 20
  clock_policy: host_capture_time_v1

notes:
  rationale:
    - "Single-arm Thunder published profile."
    - "Use the same 20 Hz published timeline as the bimanual profile."
    - "Keep the real Thunder field names instead of padding an inactive Lightning arm."
  arm_order:
    - thunder
  required_arms:
    - thunder

teleop_activity:
  topic: /spark/session/teleop_active
  active_value: true
  required_for_record: true
  required_for_convert: false
  hold_semantics: zero_order_hold_until_next_sample

published:
  observation_state:
    field: observation.state
    align: latest_before
    max_age_ms: 50
    names:
      - thunder_joint_pos_1
      - thunder_joint_pos_2
      - thunder_joint_pos_3
      - thunder_joint_pos_4
      - thunder_joint_pos_5
      - thunder_joint_pos_6
      - thunder_eef_x
      - thunder_eef_y
      - thunder_eef_z
      - thunder_eef_rx
      - thunder_eef_ry
      - thunder_eef_rz
      - thunder_gripper_position
      - thunder_ft_fx
      - thunder_ft_fy
      - thunder_ft_fz
      - thunder_ft_tx
      - thunder_ft_ty
      - thunder_ft_tz
    sources:
      thunder:
        joint_state: /spark/thunder/robot/joint_state
        eef_pose: /spark/thunder/robot/eef_pose
        tcp_wrench: /spark/thunder/robot/tcp_wrench
        gripper_state: /spark/thunder/robot/gripper_state

  action:
    field: action
    align: latest_before
    max_age_ms: 50
    names:
      - thunder_cmd_joint_1
      - thunder_cmd_joint_2
      - thunder_cmd_joint_3
      - thunder_cmd_joint_4
      - thunder_cmd_joint_5
      - thunder_cmd_joint_6
      - thunder_cmd_gripper
    sources:
      thunder:
        cmd_joint_state: /spark/thunder/teleop/cmd_joint_state
        cmd_gripper_state: /spark/thunder/teleop/cmd_gripper_state

  images:
    - field: observation.images.wrist
      topic: /spark/cameras/thunder/wrist_1/color/image_raw
      align: nearest
      max_skew_ms: 25
      required: true

    - field: observation.images.scene
      topic: /spark/cameras/world/scene_1/color/image_raw
      align: nearest
      max_skew_ms: 25
      required: true

    - field: observation.images.gelsight_left
      topic: /spark/tactile/thunder/finger_left/color/image_raw
      align: nearest
      max_skew_ms: 25
      required: false

    - field: observation.images.gelsight_right
      topic: /spark/tactile/thunder/finger_right/color/image_raw
      align: nearest
      max_skew_ms: 25
      required: false

raw_only_topics:
  - /spark/cameras/thunder/wrist_1/depth/image_rect_raw
  - /spark/cameras/world/scene_1/depth/image_rect_raw
  - /spark/tactile/thunder/finger_left/depth/image_raw
  - /spark/tactile/thunder/finger_right/depth/image_raw
  - /spark/tactile/thunder/finger_left/marker_offset
  - /spark/tactile/thunder/finger_right/marker_offset

published_depth:
  - field: observation.depth.wrist
    topic: /spark/cameras/thunder/wrist_1/depth/image_rect_raw
    align: nearest
    max_skew_ms: 25
    required: true
    unit: millimeters

  - field: observation.depth.scene
    topic: /spark/cameras/world/scene_1/depth/image_rect_raw
    align: nearest
    max_skew_ms: 25
    required: true
    unit: millimeters

conversion:
  frame_grid:
    start_rule: max_of_first_required_timestamps
    end_rule: min_of_last_required_timestamps

  missing_data_policy:
    tail_failure: truncate_episode
    mid_episode_failure: fail_episode

  diagnostics:
    - usable_interval
    - published_frame_count
    - per_modality_alignment_error
    - invalid_frame_count

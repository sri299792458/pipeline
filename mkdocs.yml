site_name: Spark Data Collection
site_description: Documentation for the RPM Lab spark-data-collection system
repo_url: https://github.com/RPM-lab-UMN/spark-data-collection
repo_name: RPM-lab-UMN/spark-data-collection
docs_dir: data_pipeline/docs
exclude_docs: |
  archive/
  internal/
  assets/README.md

theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

plugins:
  - search

nav:
  - Home: index.md
  - Setup:
    - setup.md
    - Lab Machine Quick Start: lab-machine-quick-start.md
    - Personal Account Setup: personal-account-setup.md
    - Hardware Bring-Up: hardware-bringup.md
    - First Raw Demo: first-raw-demo.md
    - First Published Conversion: first-published-conversion.md
    - First Viewer Review: first-viewer-review.md
    - Workspace Setup: workspace-setup.md
    - Python Environment Setup: python-env-setup.md
    - Viewer Setup: viewer-setup.md
    - System Setup: system-setup.md
    - Calibration: calibration.md
  - Design Choices:
    - design-choices.md
    - System Boundaries: system-boundaries.md
    - Artifact Model: artifact-model.md
    - Episode Manifest Design: episode-manifest-design.md
    - Environment and Workspace Model: environment-and-workspace-model.md
    - Sensor Runtime Design: sensor-runtime-design.md
    - Topic Contract: topic-contract.md
    - Session Capture Plan: session-capture-plan.md
    - Published Dataset Contract: dataset-mapping.md
    - Calibration Design: calibration-design.md
    - Operator Console Design: operator-console-design.md
    - Viewer Integration: viewer-integration.md
    - Archive and Compression Strategy: archive-and-compression-strategy.md
  - Operations and Debugging:
    - operations-and-debugging.md
    - USB Port and Controller Mapping: usb-port-and-controller-mapping.md
    - Current Lightning + GelSight Runbook: current-lightning-gelsight-runbook.md
    - Replay: replay.md

markdown_extensions:
  - attr_list
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
